<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLViz — Solar Analytics</title>

  <!-- Chart.js v4 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- Zoom / pan plugin (requires Hammer.js for touch pinch) -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1/dist/chartjs-plugin-zoom.min.js"></script>
  <!-- SheetJS for Excel reading -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <!-- ONNX Runtime Web — runs LightGBM model in browser via WebAssembly -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/ort.min.js"></script>
  <script>
    if (typeof ort !== 'undefined') {
      ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/';
    }
  </script>

  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       IMMERSIVE HEADER BAR
  ═══════════════════════════════════════════════ -->
  <header id="nav">
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="nav-dot"></span>
        <span class="nav-logo">MLViz</span>
      </div>

      <!-- Algorithm tab switcher — stamped by app.js -->
      <nav class="algo-tabs" id="algo-tabs" role="tablist"></nav>

      <!-- Dynamic status chip — updated by UIManager -->
      <div class="status-chip" id="status-chip">
        <span class="status-dot status-dot--idle"></span>
        <span id="status-text">Upload a data file to begin</span>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════
       MAIN WORKSPACE — two-panel grid
  ═══════════════════════════════════════════════ -->
  <main class="workspace">

    <!-- LEFT SIDEBAR — controls panel -->
    <aside class="sidebar" id="sidebar">

      <!-- File upload zone -->
      <div class="upload-zone glass-panel" id="upload-zone">
        <input type="file" id="file-input" accept=".xlsx,.xls" hidden />
        <div class="upload-content" id="upload-content">
          <div class="upload-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="upload-label">Upload Excel Data File</p>
          <p class="upload-hint">Click or drag & drop an .xlsx file</p>
          <button class="btn btn--primary btn--sm" id="upload-btn">Select File</button>
        </div>
        <div class="upload-success" id="upload-success" hidden>
          <div class="upload-icon upload-icon--success">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <p class="upload-label" id="upload-filename"></p>
          <button class="btn btn--ghost btn--sm" id="reupload-btn">Re-upload</button>
        </div>
      </div>

      <!-- Parameter controls — dynamically generated by ui.js -->
      <div id="controls-container"></div>

    </aside>

    <!-- RIGHT MAIN AREA -->
    <section class="main-area">

      <!-- Primary chart card -->
      <div class="chart-card glass-panel" id="chart-card">
        <div class="chart-header">
          <div>
            <h2 class="chart-title" id="chart-title">Isolation Forest — Anomaly Detection</h2>
            <p class="chart-subtitle" id="chart-subtitle">Upload data to begin analysis</p>
          </div>
          <div class="chart-legend" id="chart-legend"></div>
        </div>
        <div class="chart-wrapper">
          <canvas id="chart-main"></canvas>
        </div>
      </div>

      <!-- Secondary chart card (anomaly scores / residuals) -->
      <div class="chart-card chart-card--secondary glass-panel" id="chart-secondary-card">
        <div class="chart-header">
          <h3 class="chart-subtitle" id="chart-secondary-title">Anomaly Score Distribution</h3>
        </div>
        <div class="chart-wrapper chart-wrapper--secondary">
          <canvas id="chart-secondary"></canvas>
        </div>
      </div>

      <!-- Explanation + Stats row -->
      <div class="info-row">

        <!-- Narrative explanation -->
        <div class="explanation-card glass-panel" id="explanation-card">
          <p class="card-eyebrow">How It Works</p>
          <h3 class="card-title" id="explanation-title"></h3>
          <p class="card-body" id="explanation-body"></p>
        </div>

        <!-- Statistics cards row — stamped by ui.js -->
        <div class="stats-grid" id="stats-grid"></div>

      </div>

    </section>
  </main>

  <!-- ═══════════════════════════════════════════════
       SCRIPTS — load order matters
       algorithms first → data → chart → ui → app
  ═══════════════════════════════════════════════ -->
  <!-- Add new algorithm modules here — one line each -->
  <script src="js/algorithms/isolation-forest.js"></script>
  <script src="js/algorithms/ts-forecasting.js"></script>
  <!-- End algorithm modules -->

  <script src="js/data.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
